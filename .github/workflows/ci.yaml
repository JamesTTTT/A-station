name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./a-station-react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm i

      - name: Run ESLint
        run: npm run lint

      - name: Build project
        run: npm run build

  backend:
    name: Backend (FastAPI + Python)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-for-ci-only-not-secure
      REFRESH_TOKEN_SECRET_KEY: test-refresh-secret-key-for-ci-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
    defaults:
      run:
        working-directory: ./a-station-fast-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./a-station-fast-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          if find tests -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest -v
          elif ls test_*.py 1> /dev/null 2>&1; then
            pytest -v
          else
            echo "No tests found - skipping test execution"
            exit 0
          fi

      - name: Check code can be imported
        run: |
          python -c "from app.main import app; print('FastAPI app imports successfully')"
