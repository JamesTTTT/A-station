version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=astation
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./ansible_files:/app/ansible_files
      - ~/.ssh:/root/.ssh:ro
      - .:/app

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: astation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A a_station worker -l info
    depends_on:
      - db
      - redis
    environment:
      - DB_NAME=astation
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./ansible_files:/app/ansible_files
      - ~/.ssh:/root/.ssh:ro
      - .:/app

volumes:
  postgres_data:
