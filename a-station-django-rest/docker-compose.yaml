version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./ansible_files:/app/ansible_files
      - ~/.ssh:/root/.ssh:ro
      - .:/app

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: astation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: .
    command: celery -A a_station worker -l info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./ansible_files:/app/ansible_files
      - ~/.ssh:/root/.ssh:ro
      - .:/app

volumes:
  postgres_data:
