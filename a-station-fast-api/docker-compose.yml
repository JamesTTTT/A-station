version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:80"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ~/.ssh:/root/.ssh:ro
      - ~/ansible-projects:/data/ansible-projects
      - source_data:/data/a-station/sources
    develop:
      watch:
        - action: rebuild
          path: ./requirements.txt

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=astation_user
      - POSTGRES_PASSWORD=astation_password123
      - POSTGRES_DB=mydatabase

  redis:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: valkey-server --appendonly yes

  celery-beat:
    build: .
    depends_on:
      - redis
      - db
    env_file:
      - .env
    command: celery -A app.celery_app.tasks worker --beat --loglevel=info --concurrency=1 -Q celery

  worker-2-17:
    build:
      context: ../ansible-worker
      dockerfile: dockerfiles/Dockerfile.2.17
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ../ansible-worker/worker:/worker/worker
      - source_data:/data/a-station/sources:ro

volumes:
  postgres_data:
  redis_data:
  source_data:
