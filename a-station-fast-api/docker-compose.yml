version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env

  celery:
    build: .
    command: celery -A app.celery_worker.celery worker --loglevel=info
    depends_on:
      - db
      - redis

  redis:
    image: "redis:alpine"

volumes:
  postgres_data:
